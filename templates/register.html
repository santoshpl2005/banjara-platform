<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register — Banjara Platform</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
    body{background:linear-gradient(135deg,#6B0F0F,#8B1A1A,#c0392b);min-height:100vh;display:flex;align-items:center;justify-content:center}
    .box{background:white;border-radius:20px;padding:44px 40px;width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
    .logo{font-size:40px;margin-bottom:8px}
    h1{color:#8B1A1A;font-size:22px;margin-bottom:6px}
    .subtitle{color:#888;font-size:14px;margin-bottom:24px}
    .fg{margin-bottom:16px;text-align:left}
    .fg label{display:block;color:#555;font-size:13px;font-weight:bold;margin-bottom:5px}
    .fg input{width:100%;padding:12px 16px;border:2px solid #ddd;border-radius:10px;font-size:15px;outline:none;transition:border .2s}
    .fg input:focus{border-color:#8B1A1A}
    .btn{width:100%;padding:14px;background:#8B1A1A;color:white;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer}
    .btn:hover{background:#a52020}
    .error{background:#f8d7da;color:#721c24;padding:12px;border-radius:8px;margin-bottom:16px;font-size:14px}
    .success{background:#d4edda;color:#155724;padding:12px;border-radius:8px;margin-bottom:16px;font-size:14px}
    .links{margin-top:20px;font-size:14px;color:#888}
    .links a{color:#8B1A1A;font-weight:bold;text-decoration:none}
    .terms{font-size:12px;color:#aaa;margin-top:14px}
  </style>
  <!-- ANIMATIONS -->
  <link rel="stylesheet" href="/static/css/animations.css">
  <script src="/static/js/animations.js" defer></script>

</head>
<body>
<div class="box">
  <div class="logo">🌿</div>
  <h1>Create Account</h1>
  <p class="subtitle">Join the Banjara Cultural Platform</p>
  {% if error %}<div class="error">❌ {{ error }}</div>{% endif %}
  {% if success %}<div class="success">✅ {{ success }} <a href="/login">Login now →</a></div>{% endif %}
  <form method="POST">
    <div class="fg">
      <label>👤 Full Name</label>
      <input type="text" name="name" placeholder="Enter your full name" required>
    </div>
    <div class="fg">
      <label>📧 Email Address</label>
      <input type="email" name="email" placeholder="Enter your email" required>
    </div>
    <div class="fg">
      <label>🔒 Password</label>
      <input type="password" name="password" placeholder="Create a password (min 6 chars)" minlength="6" required>
    </div>
    <div class="fg">
      <label>🔒 Confirm Password</label>
      <input type="password" id="confirm" placeholder="Repeat your password" required>
    </div>
    <button type="submit" class="btn">Create Account →</button>
  </form>
  <div class="links">Already have an account? <a href="/login">Login here</a></div>
  <p class="terms">By registering you agree to preserve and respect Banjara cultural heritage 🌿</p>
</div>
<script>
document.querySelector('form').onsubmit=function(e){
  const p=document.querySelector('[name=password]').value;
  const c=document.getElementById('confirm').value;
  if(p!==c){e.preventDefault();alert('Passwords do not match!');}
};
</script>
</body>
</html>
