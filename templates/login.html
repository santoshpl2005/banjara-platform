<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login — Banjara Platform</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
    body{background:linear-gradient(135deg,#6B0F0F,#8B1A1A,#c0392b);min-height:100vh;display:flex;align-items:center;justify-content:center}
    .box{background:white;border-radius:20px;padding:48px 40px;width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
    .logo{font-size:40px;margin-bottom:8px}
    h1{color:#8B1A1A;font-size:24px;margin-bottom:6px}
    .subtitle{color:#888;font-size:14px;margin-bottom:28px}
    .fg{margin-bottom:18px;text-align:left}
    .fg label{display:block;color:#555;font-size:13px;font-weight:bold;margin-bottom:5px}
    .fg input{width:100%;padding:12px 16px;border:2px solid #ddd;border-radius:10px;font-size:15px;outline:none;transition:border .2s}
    .fg input:focus{border-color:#8B1A1A}
    .btn{width:100%;padding:14px;background:#8B1A1A;color:white;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:6px}
    .btn:hover{background:#a52020}
    .error{background:#f8d7da;color:#721c24;padding:12px;border-radius:8px;margin-bottom:18px;font-size:14px}
    .links{margin-top:22px;font-size:14px;color:#888}
    .links a{color:#8B1A1A;font-weight:bold;text-decoration:none}
    .divider{display:flex;align-items:center;gap:10px;margin:20px 0}
    .divider hr{flex:1;border:none;border-top:1px solid #eee}
    .divider span{color:#aaa;font-size:13px}
    .guest-btn{width:100%;padding:12px;background:#fef9f0;color:#8B1A1A;border:2px solid #8B1A1A;border-radius:10px;font-size:14px;cursor:pointer;font-weight:bold}
    .guest-btn:hover{background:#fdf0d0}
  </style>
</head>
<body>
<div class="box">
  <div class="logo">🌿</div>
  <h1>Welcome Back!</h1>
  <p class="subtitle">Banjara Cultural Platform</p>
  {% if error %}
  <div class="error">❌ {{ error }}</div>
  {% endif %}
  <form method="POST">
    <div class="fg">
      <label>📧 Email Address</label>
      <input type="email" name="email" placeholder="Enter your email" required>
    </div>
    <div class="fg">
      <label>🔒 Password</label>
      <input type="password" name="password" placeholder="Enter your password" required>
    </div>
    <button type="submit" class="btn">Login →</button>
   
   

<!-- ADD THIS AFTER THE BUTTON -->
<div style="text-align:right;margin-top:10px">
  <a href="/forgot-password" style="color:#8B1A1A;font-size:13px;text-decoration:none;font-weight:bold">
    🔐 Forgot Password?
  </a>
</div> 
  </form>
  <div class="divider"><hr><span>or</span><hr></div>
  <button class="guest-btn" onclick="window.location='/'">👤 Continue as Guest</button>
  <div class="links">
    Don't have an account? <a href="/register">Register here</a>
  </div>
</div>
</body>
</html>
