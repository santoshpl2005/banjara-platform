<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Temple</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: #f5f5f5; }
    .topbar { background: #8B1A1A; padding: 16px 30px; display: flex; justify-content: space-between; align-items: center; }
    .topbar h1 { color: white; font-size: 20px; }
    .topbar a { color: #ffd700; text-decoration: none; }
    .container { max-width: 650px; margin: 40px auto; padding: 0 20px; }
    .form-box { background: white; border-radius: 12px; padding: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
    .form-box h2 { color: #8B1A1A; margin-bottom: 24px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-weight: bold; color: #555; margin-bottom: 6px; }
    .form-group input, .form-group textarea {
      width: 100%; padding: 12px 16px;
      border: 2px solid #ddd; border-radius: 8px;
      font-size: 15px; outline: none;
    }
    .form-group input:focus, .form-group textarea:focus { border-color: #8B1A1A; }
    .form-group textarea { height: 120px; resize: vertical; }
    .submit-btn { background: #8B1A1A; color: white; padding: 14px 30px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; }
    .success { background: #d4edda; color: #155724; padding: 14px; border-radius: 8px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>🛕 Add Temple</h1>
    <a href="/admin/dashboard">← Back to Dashboard</a>
  </div>
  <div class="container">
    <div class="form-box">
      <h2>Add New Temple / Pilgrimage Site</h2>
      {% if success %}
      <div class="success">✅ {{ success }}</div>
      {% endif %}
      <form method="POST">
        <div class="form-group">
          <label>Temple Name</label>
          <input type="text" name="name" placeholder="e.g. Sevalal Maharaj Temple" required>
        </div>
        <div class="form-group">
          <label>Location</label>
          <input type="text" name="location" placeholder="e.g. Bhayagada(Suragondanakoppa), Karnataka" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea name="description" placeholder="Describe the temple and its significance..." required></textarea>
        </div>
        <button type="submit" class="submit-btn">Add Temple ✓</button>
      </form>
    </div>
  </div>
</body>
</html>
