<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body {
      background: linear-gradient(135deg, #8B1A1A, #c0392b);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      background: white; border-radius: 16px;
      padding: 50px 40px; width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    .login-box h1 { color: #8B1A1A; font-size: 26px; margin-bottom: 8px; }
    .login-box p { color: #888; margin-bottom: 30px; font-size: 14px; }
    .form-group { margin-bottom: 20px; text-align: left; }
    .form-group label { display: block; color: #555; font-size: 14px; margin-bottom: 6px; font-weight: bold; }
    .form-group input {
      width: 100%; padding: 12px 16px;
      border: 2px solid #ddd; border-radius: 8px;
      font-size: 15px; outline: none;
    }
    .form-group input:focus { border-color: #8B1A1A; }
    .login-btn {
      width: 100%; padding: 14px;
      background: #8B1A1A; color: white;
      border: none; border-radius: 8px;
      font-size: 16px; font-weight: bold;
      cursor: pointer; margin-top: 10px;
    }
    .login-btn:hover { background: #a52020; }
    .error {
      background: #f8d7da; color: #721c24;
      padding: 12px; border-radius: 8px;
      margin-bottom: 20px; font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>🛡️ Admin Panel</h1>
    <p>Banjara Cultural Platform</p>
    {% if error %}
    <div class="error">❌ {{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="login-btn">Login →</button>
    </form>
  </div>
</body>
</html>
