<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Users</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
    body{background:#f5f5f5}
    .topbar{background:#8B1A1A;padding:16px 30px;display:flex;justify-content:space-between;align-items:center}
    .topbar h1{color:white;font-size:20px}
    .topbar a{color:#ffd700;text-decoration:none}
    .container{padding:30px;max-width:900px;margin:0 auto}
    table{width:100%;border-collapse:collapse;background:white;border-radius:12px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,.08)}
    th{background:#8B1A1A;color:white;padding:14px 16px;text-align:left;font-size:14px}
    td{padding:14px 16px;border-bottom:1px solid #eee;font-size:14px;color:#555}
    tr:hover td{background:#fef9f0}
    .empty{text-align:center;padding:40px;color:#888}
    .count{background:#fdf0d0;color:#8B1A1A;padding:8px 16px;border-radius:8px;font-size:14px;margin-bottom:16px;display:inline-block}
  </style>
</head>
<body>
  <div class="topbar">
    <h1>👥 Registered Users</h1>
    <a href="/admin/dashboard">← Back</a>
  </div>
  <div class="container">
    <span class="count">Total: {{ users|length }} users</span>
    <table>
      <thead>
        <tr><th>#</th><th>Name</th><th>Email</th><th>Joined</th></tr>
      </thead>
      <tbody>
        {% for u in users %}
        <tr>
          <td>{{ u[0] }}</td>
          <td>👤 {{ u[1] }}</td>
          <td>{{ u[2] }}</td>
          <td>{{ u[3] }}</td>
        </tr>
        {% else %}
        <tr><td colspan="4" class="empty">No users registered yet.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</body>
</html>
